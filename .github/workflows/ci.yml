# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.actor }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # mlugg/setup-zig@v2 still runs on Node 20 (no Node 24 release upstream yet).
      # It will continue to work via the runner compatibility shim until Sep 2026.
      - uses: mlugg/setup-zig@v2
      - name: Check formatting
        run: make zig-lint

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS pinned to macos-14: Zig 0.15.2 fails to link against the
        # macOS 15 SDK on macos-latest (undefined libSystem symbols such as
        # __availability_version_check). macos-14 was the last known-good image.
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        if: runner.os != 'Windows'
      # AFL++ corpus files (tests/fuzz/) use colon-containing filenames that
      # are invalid on Windows filesystems. actions/checkout always runs
      # `git checkout` after fetching, which validates all paths on Windows
      # regardless of sparse-checkout filters. The only workaround is
      # core.protectNTFS=false, applied here via a manual git setup.
      - name: Checkout (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git init
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git sparse-checkout init --no-cone
          git sparse-checkout set '/*' '!/tests/fuzz/'
          git -c core.protectNTFS=false fetch --depth=1 origin ${{ github.sha }}
          git -c core.protectNTFS=false checkout FETCH_HEAD
      # mlugg/setup-zig@v2 still runs on Node 20 (no Node 24 release upstream yet).
      # It will continue to work via the runner compatibility shim until Sep 2026.
      - uses: mlugg/setup-zig@v2
        with:
          # Reads minimum_zig_version from build.zig.zon automatically.
          cache-size-limit: 2048
      # `zig build` is called directly instead of `make zig-build-debug` for
      # two reasons:
      #   1. `make` is not pre-installed on the windows-latest runner, and
      #      installing it (e.g. via Chocolatey) would add overhead and a
      #      dependency for a single-command wrapper.
      #   2. `--summary all` is intentionally absent from the Makefile target
      #      to keep incremental local rebuilds quiet (the flag prints every
      #      step even on cache hits). In CI the cache is always cold, so the
      #      flag is added here where it matters.
      - name: Build
        run: zig build --summary all
      # Same rationale as above applies to `zig build test` vs `make zig-test`.
      # zig-test-discovery is executed on linux only (and it is enough)
      - name: Test
        run: zig build test --summary all

  cross-compile:
    name: Cross-Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      # mlugg/setup-zig@v2 still runs on Node 20 (no Node 24 release upstream yet).
      # It will continue to work via the runner compatibility shim until Sep 2026.
      - uses: mlugg/setup-zig@v2
        with:
          cache-size-limit: 4096
      - name: Cross-compile x86_64-linux-musl
        run: zig build -Dtarget=x86_64-linux-musl --summary all
      - name: Cross-compile aarch64-linux-musl
        run: zig build -Dtarget=aarch64-linux-musl --summary all
      - name: Cross-compile x86_64-macos
        run: zig build -Dtarget=x86_64-macos --summary all
      - name: Cross-compile aarch64-macos
        run: zig build -Dtarget=aarch64-macos --summary all
      - name: Cross-compile x86_64-windows
        run: zig build -Dtarget=x86_64-windows --summary all
      - name: Cross-compile aarch64-windows
        run: zig build -Dtarget=aarch64-windows --summary all

  tests-check:
    name: Tests Script Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run E2E Lint
        run: make e2e-lint
      - name: Run Manual Lint
        run: make manual-lint
      - name: Run Fuzz Lint
        run: make fuzz-lint
      - name: Check corpus filenames (Windows-safe)
        run: make fuzz-sanitize
      # e2e dryrun needs the binary built first
      - name: Build
        run: make zig-build-debug
      - name: Run E2E Dry-run
        run: make e2e-dryrun
      - name: Run Zig Test Discovery
        run: make zig-test-discovery

  docs-check:
    name: Docs Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # mlugg/setup-zig@v2 still runs on Node 20 (no Node 24 release upstream yet).
      # It will continue to work via the runner compatibility shim until Sep 2026.
      - uses: mlugg/setup-zig@v2
        with:
          cache-size-limit: 2048
      # `make zig-docs-check` wraps `zig build docs` (compiling the `zoqa` library
      # with -femit-docs) and then verifies the emitted output is non-empty. This
      # catches doc-build regressions the docstring *format* linter
      # (tools/check_docstrings.py) cannot: a source file losing its trailing
      # newline (autodoc silently renders it empty) or a rename breaking the
      # module-root naming rule. This job is Linux-only, so `make` is available
      # (unlike the cross-platform build-and-test job).
      - name: Build and verify docs
        run: make zig-docs-check

  # Aggregation job for branch protection required status checks.
  # Handles the GitHub quirk where skipped jobs count as "success".
  ci:
    name: CI
    if: always()
    needs: [lint, build-and-test, cross-compile, tests-check, docs-check]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
