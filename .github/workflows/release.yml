# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

# Prevent parallel release runs for the same tag.
# If `git push --tags` fires multiple events for the same tag, only the
# latest run proceeds — earlier ones are cancelled automatically.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PROJECT_NAME: zoqa

jobs:
  # ── Guard: skip tags that already have a GitHub Release ──────────────
  check:
    name: Check for existing release
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release ${{ github.ref_name }} already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No existing release for ${{ github.ref_name }} — proceeding."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build matrix (gated on check) ──────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-linux-musl
            ext: tar.gz
          - name: linux-aarch64
            target: aarch64-linux-musl
            ext: tar.gz
          - name: macos-x86_64
            target: x86_64-macos
            ext: tar.gz
          - name: macos-aarch64
            target: aarch64-macos
            ext: tar.gz
          - name: windows-x86_64
            target: x86_64-windows
            ext: zip
          - name: windows-aarch64
            target: aarch64-windows
            ext: zip

    steps:
      - uses: actions/checkout@v6

      - name: Setup Zig
        # mlugg/setup-zig@v2 still runs on Node 20 (no Node 24 release upstream yet).
        # It will continue to work via the runner compatibility shim until Sep 2026.
        uses: mlugg/setup-zig@v2
        with:
          # Reads minimum_zig_version from build.zig.zon automatically.
          cache-key: ${{ matrix.target }}
          cache-size-limit: 2048

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          zig build \
            -Doptimize=ReleaseSafe \
            -Dtarget=${{ matrix.target }} \
            -Dstrip=true \
            --summary all

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          BINARY="${{ env.PROJECT_NAME }}"
          ARCHIVE="${{ env.PROJECT_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.name }}.tar.gz"
          tar caf "$ARCHIVE" \
            --sort=name \
            --numeric-owner \
            --owner=0 \
            --group=0 \
            --mtime=1970-01-01 \
            -C zig-out/bin "$BINARY"
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.ext == 'zip'
        run: |
          ARCHIVE="${{ env.PROJECT_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.name }}.zip"
          7z a -mx=9 "$ARCHIVE" "./zig-out/bin/${{ env.PROJECT_NAME }}.exe"
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha256sum "${{ env.archive }}" > "${{ env.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.name }}
          path: |
            ${{ env.archive }}
            ${{ env.archive }}.sha256

  # ── Create GitHub Release (gated on check) ─────────────────────────
  release:
    name: Create GitHub Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: ${{ env.PROJECT_NAME }}-*
          merge-multiple: true

      - name: Consolidate checksums into SHA256SUMS
        run: |
          cd artifacts
          cat -- *.sha256 > SHA256SUMS

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          body: |
            ## Verify checksums

            ```sh
            sha256sum -c SHA256SUMS
            ```
